apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexops-jenkins-master
  namespace: monitoring
  labels:
    app: jenkins-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-server
  template:
    metadata:
      labels:
        app: jenkins-server
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts-jdk17
        securityContext:
          privileged: true
        ports:
        - containerPort: 8080
        - containerPort: 50000
        volumeMounts:
        - mountPath: /var/jenkins_home
          name: jenkins-home-volume
        - mountPath: /run/k3s/containerd/containerd.sock
          name: docker-sock
      volumes:
      - name: jenkins-home-volume
        persistentVolumeClaim:
          claimName: jenkins-storage-pvc
      - name: docker-sock
        hostPath:
          path: /run/k3s/containerd/containerd.sock
          type: Socket
