apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-storage-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexops-jenkins-master
  namespace: monitoring
  labels:
    app: jenkins-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-server
  template:
    metadata:
      labels:
        app: jenkins-server
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk17
          ports:
            - containerPort: 8080
              name: web-port
            - containerPort: 50000
              name: agent-port
          resources:
            limits:
              memory: "1500Mi"
              cpu: "1000m"
            requests:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: jenkins-home-volume
              mountPath: /var/jenkins_home
      volumes:
        - name: jenkins-home-volume
          persistentVolumeClaim:
            claimName: jenkins-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-ui-service
  namespace: monitoring
spec:
  selector:
    app: jenkins-server
  type: NodePort
  ports:
    - name: http-ui
      port: 8080
      targetPort: 8080
      nodePort: 32000
    - name: agent-jnlp
      port: 50000
      targetPort: 50000
      nodePort: 32500